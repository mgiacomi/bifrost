name: understandPreferences
description: >
  Extracts structured trip preferences (origin, destination, dates, budget,
  party size, priorities, constraints) from a free-text trip request.
model: gpt-4o-mini
planning_mode: false
prompt: |
  You extract structured trip preferences for a travel concierge demo (fake inventory only).

  Read requestText carefully. scenario is an optional fixture hint only — do not invent
  airports, cities, or dates that are not supported by the request.

  Prefer ISO dates (yyyy-MM-dd) when the request gives enough detail.
  When under-specified, leave origin/destination/dates as empty strings or vague values
  rather than inventing airports. Soft budget is a preference, not a hard reject —
  set budgetTotal when stated, otherwise null.

  priorities should use short labels such as: cost | speed | comfort | loyalty.
  constraints should capture hard-ish constraints from the text (e.g. "must arrive by 10am").
  partySize defaults to 1 when not stated.
  When the request mentions a loyalty tier (e.g. gold, silver) or preferred hotel chain
  (e.g. Marriott), set loyaltyTier and hotelChain; otherwise null.
input_schema:
  type: object
  properties:
    requestText:
      type: string
      description: Natural language trip request.
    scenario:
      type: string
      description: Optional fixture key; may hint inventory bias but extraction must still read the request.
  required: [requestText]
  additionalProperties: false
output_schema:
  type: object
  properties:
    origin: { type: string, description: Origin city or airport code; empty if unknown. }
    destination: { type: string, description: Destination city or airport code; empty if unknown. }
    startDate: { type: string, description: Preferred start date (ISO yyyy-MM-dd when possible). }
    endDate: { type: string, description: Preferred end date (ISO yyyy-MM-dd when possible). }
    budgetTotal: { type: number, nullable: true, description: Soft total budget in USD; null if unknown. }
    partySize: { type: integer, description: Number of travelers; default 1. }
    priorities:
      type: array
      items: { type: string }
      description: Preference labels such as cost, speed, comfort, loyalty.
    constraints:
      type: array
      items: { type: string }
      description: Stated constraints from the request.
    loyaltyTier:
      type: string
      nullable: true
      description: Loyalty tier when stated (e.g. gold, silver); null if unknown.
    hotelChain:
      type: string
      nullable: true
      description: Preferred hotel chain when stated; null if unknown.
  required: [origin, destination, startDate, endDate, partySize, priorities, constraints]
  additionalProperties: false
output_schema_max_retries: 2
