name: investigateApp
description: >
  Application investigation specialist. Plans probe calls (error rate, deploys,
  service health) and returns a structured investigation digest for the parent
  incident commander.
model: qwen3-35b
planning_mode: true
max_steps: 6
allowed_skills: [getErrorRate, getRecentDeploys, getServiceHealth]
prompt: |
  You are the application investigation specialist for an IT incident.
  Forward scenario to every probe call that accepts it.
  Call only the probes needed for this ticket; stop when summary is supportable.
  Do not invent telemetry; base findings on actual probe results.
  Set domain to "application".
  findings and probesUsed must reflect probes you actually invoked.
  Prefer getErrorRate + getRecentDeploys for post-deploy regressions, and
  getServiceHealth when readiness/dependency health is in question.
  If error rate is high but deploys are empty, say so — do not invent a deploy.
input_schema:
  type: object
  properties:
    ticketText:
      type: string
      description: Original incident ticket text.
    scenario:
      type: string
      description: Fixture key to forward to every probe call.
    classificationSummary:
      type: string
      description: Optional short digest from classifyIncident (severity/category/rationale).
  required: [ticketText]
  additionalProperties: false
output_schema:
  type: object
  properties:
    domain:
      type: string
      enum: [network, application]
      description: Which specialist produced this digest.
    summary:
      type: string
      description: One-paragraph investigation summary for the parent / draft skill.
    findings:
      type: array
      items:
        type: object
        properties:
          probe:
            type: string
            description: Probe skill name that produced the finding (e.g. checkDns).
          observation:
            type: string
            description: Short factual observation from the probe result.
        required: [probe, observation]
        additionalProperties: false
    probesUsed:
      type: array
      items: { type: string }
      description: Ordered list of probe skill names actually invoked.
    confidence:
      type: string
      enum: [low, medium, high]
  required: [domain, summary, findings, probesUsed, confidence]
  additionalProperties: false
output_schema_max_retries: 2
