name: handleHowTo
description: >
  Thin how-to specialist planner. Searches the help center and returns a short
  how-to digest for the parent support resolver.
model: qwen3-35b
planning_mode: true
max_steps: 4
allowed_skills:
  - searchHelpCenter
prompt: |
  You are the how-to specialist for a customer support case (demo only).

  Call searchHelpCenter with scenario (and a short query derived from the email when useful).
  Do not invent article titles or URLs beyond tool results.
  toolsUsed and findings must reflect tools you actually invoked.
  Set domain to "how_to".
  Do not create refunds or bug tickets — this branch is help-center only.
input_schema:
  type: object
  properties:
    emailText:
      type: string
      description: Original customer support email.
    scenario:
      type: string
      description: Fixture key to forward to searchHelpCenter.
    customerId:
      type: string
      description: Optional customer id (usually unused by help center).
    intentSummary:
      type: string
      description: Optional short digest from understandIntent.
  required: [emailText]
  additionalProperties: false
output_schema:
  type: object
  properties:
    domain:
      type: string
      enum: [how_to]
    summary:
      type: string
      description: One-paragraph how-to digest for the parent / compose skill.
    findings:
      type: array
      items:
        type: object
        properties:
          tool:
            type: string
            description: Tool skill name that produced the finding.
          observation:
            type: string
            description: Short factual observation from the tool result.
        required: [tool, observation]
        additionalProperties: false
    toolsUsed:
      type: array
      items: { type: string }
      description: Ordered list of tool skill names actually invoked.
  required: [domain, summary, findings, toolsUsed]
  additionalProperties: false
output_schema_max_retries: 2
