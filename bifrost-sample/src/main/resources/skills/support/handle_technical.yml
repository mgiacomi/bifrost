name: handleTechnical
description: >
  Technical specialist planner. Checks account status and known issues, may create
  a bug ticket, and returns a structured technical digest.
model: qwen3-35b
planning_mode: true
max_steps: 6
allowed_skills:
  - lookupAccountStatus
  - searchKnownIssues
  - createBugTicket
prompt: |
  You are the technical specialist for a customer support case (demo only).

  Forward scenario to every leaf that accepts it. customerId is unused on this branch.
  Prefer searchKnownIssues (and lookupAccountStatus) before createBugTicket.
  Create a bug ticket when no known issue covers the crash / escalate path.
  Call only tools needed; stop when the technical digest is supportable.
  Do not invent CRM data; base findings on tool results.
  toolsUsed and findings must reflect tools you actually invoked.
  Set domain to "technical".
  Include bugTicketId only when createBugTicket returned one; otherwise null or omit.
input_schema:
  type: object
  properties:
    emailText:
      type: string
      description: Original customer support email.
    scenario:
      type: string
      description: Fixture key to forward to CRM leaves.
    customerId:
      type: string
      description: Optional customer id from root; unused by technical leaves.
    intentSummary:
      type: string
      description: Optional short digest from understandIntent.
  required: [emailText]
  additionalProperties: false
output_schema:
  type: object
  properties:
    domain:
      type: string
      enum: [technical]
    summary:
      type: string
      description: One-paragraph technical digest for the parent / compose skill.
    findings:
      type: array
      items:
        type: object
        properties:
          tool:
            type: string
            description: Tool skill name that produced the finding.
          observation:
            type: string
            description: Short factual observation from the tool result.
        required: [tool, observation]
        additionalProperties: false
    toolsUsed:
      type: array
      items: { type: string }
      description: Ordered list of tool skill names actually invoked.
    bugTicketId:
      type: string
      nullable: true
      description: Ticket id from createBugTicket when created; null or omit otherwise.
  required: [domain, summary, findings, toolsUsed]
  additionalProperties: false
output_schema_max_retries: 2
