spring:
  application:
    name: bifrost-sample

server:
  port: 8081

logging:
  level:
    com.lokiscale.bifrost.sample: INFO
    com.lokiscale.bifrost.chat: DEBUG
    com.lokiscale.bifrost.linter: DEBUG
    com.lokiscale.bifrost.outputschema: DEBUG
    com.lokiscale.bifrost.runtime.planning: DEBUG
    org.springframework.ai.chat.client: DEBUG

bifrost:
  connections:
    ollama-main:
      driver: ollama
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    ollama-secondary:
      driver: ollama
      base-url: ${OLLAMA_SECONDARY_BASE_URL:http://localhost:11435}
    openai-main:
      driver: openai
      api-key: ${BIFROST_OPENAI_API_KEY:test-openai-api-key}
    openrouter:
      driver: openai
      base-url: https://openrouter.ai/api/v1
      api-key: ${BIFROST_OPENROUTER_API_KEY:test-openrouter-api-key}
  session:
    mission-timeout: 6000s
  skills:
    locations:
      - classpath:/skills/**/*.yml
      - classpath:/skills/**/*.yaml
  models:
    granite4-tiny:
      connection: ollama-main
      provider-model: ibm/granite4:tiny-h
    gemma4-e2b:
      connection: ollama-secondary
      provider-model: gemma4:e2b
    gemma4-26b:
      connection: ollama-main
      provider-model: gemma4:26b
    gemma4-e4b:
      connection: ollama-secondary
      provider-model: gemma4:e4b
    default-model:
      connection: ollama-main
      provider-model: ibm/granite4:tiny-h
    openai-gpt-5-mini:
      connection: openai-main
      provider-model: gpt-5-mini
    qwen3-35b:
      connection: openrouter
      provider-model: qwen/qwen3.6-35b-a3b
    gpt-4o-mini:
      connection: openrouter
      provider-model: openai/gpt-4o-mini

execution-trace:
  persistence: ALWAYS
