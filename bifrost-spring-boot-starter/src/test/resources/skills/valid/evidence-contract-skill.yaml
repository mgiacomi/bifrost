name: evidenceContractSkill
description: Skill with an evidence contract
model: gpt-5
allowed_skills: [invoiceParser, expenseLookup]
output_schema:
  type: object
  additionalProperties: false
  properties:
    vendorName:
      type: string
    isDuplicate:
      type: boolean
  required:
    - vendorName
    - isDuplicate
output_schema_max_retries: 1
evidence_contract:
  claims:
    vendorName: invoiceParser
    isDuplicate: invoiceParser and expenseLookup
